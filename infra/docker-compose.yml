services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voice_agent
      POSTGRES_USER: voice_agent
      POSTGRES_PASSWORD: voice_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
